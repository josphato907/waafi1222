<!DOCTYPE html>
<html lang="so">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Codsiga Amaahda - Summary</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .nav-header {
            width: 100%;
            background: linear-gradient(90deg, #a4e433 0%, #4caf50 100%);
            padding: 16px 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .nav-header .back-btn-header {
            cursor: pointer;
            font-size: 18px;
            font-weight: 500;
        }
        
        .waafi-logo {
            font-size: 22px;
            font-weight: 700;
        }
        
        .menu-icon {
            font-size: 26px;
            cursor: pointer;
        }
        
        .form-card {
            background: white;
            width: 92%;
            max-width: 480px;
            margin-top: 20px;
            padding: 28px 20px;
            border-radius: 14px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        }
        
        h2 {
            text-align: center;
            font-size: 24px;
            color: #222;
            font-weight: 600;
        }
        
        .step-info {
            text-align: center;
            font-size: 14px;
            color: #999;
            margin: 6px 0 22px;
        }
        
        .progress-box {
            display: flex;
            gap: 8px;
            margin-bottom: 28px;
        }
        
        .bar {
            height: 4px;
            flex: 1;
            background: #82d13d;
            border-radius: 2px;
        }
        
        .input-wrap {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        
        select,
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #d1d1d1;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: border 0.2s;
            background: #fff;
        }
        
        select:focus,
        input:focus {
            border-color: #82d13d;
        }
        
        .summary-box {
            background: #fafcfa;
            border-left: 5px solid #82d13d;
            padding: 18px 20px;
            border-radius: 10px;
            margin: 24px 0;
        }
        
        .summary-box h3 {
            margin: 0 0 14px 0;
            font-size: 17px;
            font-weight: 700;
            color: #222;
        }
        
        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
        }
        
        .summary-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .summary-label {
            color: #777;
            font-size: 14px;
        }
        
        .summary-value {
            font-weight: 600;
            font-size: 14px;
            color: #111;
            text-align: right;
        }
        
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .back-btn {
            background: #b0b0b0;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.2s;
        }
        
        .back-btn:active {
            background: #9a9a9a;
        }
        
        .submit-btn {
            background: linear-gradient(90deg, #a4e433 0%, #7dbd27 100%);
            color: white;
            border: none;
            padding: 17px;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: opacity 0.2s;
        }
        
        .submit-btn:active {
            opacity: 0.85;
        }
        
        .footer-text {
            text-align: center;
            font-size: 12px;
            color: #bbb;
            margin-top: 32px;
            padding-bottom: 24px;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="nav-header">
        <div class="back-btn-header" onclick="goBack()">← Dib u noqo</div>
        <div class="waafi-logo">Waafi</div>
        <div class="menu-icon">☰</div>
    </div>

    <!-- Form Card -->
    <div class="form-card">
        <h2>Codsiga Amaahda</h2>
        <p class="step-info">Tallaabada 3 ee 3</p>

        <!-- Progress: Step 3 of 3 -->
        <div class="progress-box">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <!-- Job Status -->
        <div class="input-wrap">
            <label for="jobStatus">Xaaladda Shaqada</label>
            <select id="jobStatus">
                <option value="Shaqaale">Shaqaale</option>
                <option value="Ganacsade">Ganacsade</option>
                <option value="Arday">Arday</option>
                <option value="Shaqo la'aan">Shaqo la'aan</option>
                <option value="Hawlgab">Hawlgab</option>
            </select>
        </div>

        <!-- Income -->
        <div class="input-wrap">
            <label for="income">Dakhliga Sanadka ($)</label>
            <input type="text" id="income" placeholder="Tusaale: 25000">
        </div>

        <!-- Summary Box -->
        <div class="summary-box">
            <h3>Soo koobidda Codsiga</h3>

            <div class="summary-item">
                <span class="summary-label">Qaddarka Amaahda:</span>
                <span class="summary-value" id="sumAmount">--</span>
            </div>

            <div class="summary-item">
                <span class="summary-label">Muddada Amaahda:</span>
                <span class="summary-value" id="sumDuration">--</span>
            </div>

            <div class="summary-item">
                <span class="summary-label">Ujeedada:</span>
                <span class="summary-value" id="sumPurpose">--</span>
            </div>

            <div class="summary-item">
                <span class="summary-label">Codsade:</span>
                <span class="summary-value" id="sumName">--</span>
            </div>
        </div>

        <!-- Buttons -->
        <div class="btn-container">
            <button type="button" class="back-btn" onclick="goBack()">KA HORE</button>
            <button type="button" class="submit-btn" onclick="submitForm()">DIR CODSIGA</button>
        </div>
    </div>

    <div class="footer-text">© 2025 Waafi Soomaaliya</div>

    <script>
        // ---------- Load summary on page load ----------
        window.addEventListener('DOMContentLoaded', function() {
            const tg = window.Telegram && window.Telegram.WebApp;
            if (tg) {
                tg.ready();
                tg.expand();
            }

            // Populate summary from localStorage
            const amount = localStorage.getItem('amount');
            const duration = localStorage.getItem('loanDuration');
            const purpose = localStorage.getItem('loanPurpose');
            const fName = localStorage.getItem('firstName') || "";
            const lName = localStorage.getItem('lastName') || "";

            document.getElementById('sumAmount').textContent = amount ? `$${amount}` : "--";
            document.getElementById('sumDuration').textContent = duration || "--";
            document.getElementById('sumPurpose').textContent = purpose || "--";
            document.getElementById('sumName').textContent = `${fName} ${lName}`.trim() || "--";
        });

        // ---------- Submit form ----------
        function submitForm() {
            const tg = window.Telegram && window.Telegram.WebApp;

            const data = {
                amount: localStorage.getItem('amount'),
                duration: localStorage.getItem('loanDuration'),
                purpose: localStorage.getItem('loanPurpose'),
                firstName: localStorage.getItem('firstName'),
                lastName: localStorage.getItem('lastName'),
                phone: localStorage.getItem('phone'),
                jobStatus: document.getElementById('jobStatus').value,
                income: document.getElementById('income').value
            };

            // Save job status and income for next page
            localStorage.setItem('jobStatus', data.jobStatus);
            localStorage.setItem('income', data.income);

            if (tg && tg.sendData) {
                tg.sendData(JSON.stringify(data));
                setTimeout(function() {
                    window.location.href = "page5.html";
                }, 500);
            } else {
                console.log("Submitted:", data);
                window.location.href = "page5.html";
            }
        }

        // ---------- Go back to page3 ----------
        function goBack() {
            window.location.href = "page3.html";
        }
    </script>

</body>

</html>
