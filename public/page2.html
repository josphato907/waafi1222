<!DOCTYPE html>
<html lang="so">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Codsiga Amaahda - Step 1</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .nav-header {
            width: 100%;
            background: linear-gradient(90deg, #a4e433 0%, #4caf50 100%);
            padding: 16px 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .nav-header .back-btn-header {
            cursor: pointer;
            font-size: 18px;
            font-weight: 500;
        }
        
        .waafi-logo {
            font-size: 22px;
            font-weight: 700;
        }
        
        .menu-icon {
            font-size: 26px;
            cursor: pointer;
        }
        
        .form-card {
            background: white;
            width: 92%;
            max-width: 480px;
            margin-top: 20px;
            padding: 28px 20px;
            border-radius: 14px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        }
        
        h2 {
            text-align: center;
            font-size: 24px;
            color: #222;
            font-weight: 600;
        }
        
        .step-info {
            text-align: center;
            font-size: 14px;
            color: #999;
            margin: 6px 0 22px;
        }
        
        .progress-box {
            display: flex;
            gap: 8px;
            margin-bottom: 30px;
        }
        
        .bar {
            height: 4px;
            flex: 1;
            background: #e0e0e0;
            border-radius: 2px;
        }
        
        .bar.active-bar {
            background: #82d13d;
        }
        
        .input-wrap {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        
        select,
        input,
        textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #d1d1d1;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: border 0.2s;
        }
        
        select:focus,
        textarea:focus {
            border-color: #82d13d;
        }
        
        input[readonly] {
            background: #f4f6f4;
            color: #555;
            cursor: not-allowed;
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .btn-container {
            margin-top: 28px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .back-btn {
            background: #f1f1f1;
            color: #777;
            border: 1px solid #ddd;
            padding: 16px;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .back-btn:active {
            background: #e5e5e5;
        }
        
        .next-btn {
            background: linear-gradient(90deg, #a4e433 0%, #7dbd27 100%);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: opacity 0.2s;
        }
        
        .next-btn:active {
            opacity: 0.85;
        }
        
        .footer-text {
            text-align: center;
            font-size: 12px;
            color: #bbb;
            margin-top: 32px;
            padding-bottom: 24px;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="nav-header">
        <div class="back-btn-header" onclick="goBack()">← Dib u noqo</div>
        <div class="waafi-logo">Waafi</div>
        <div class="menu-icon">☰</div>
    </div>

    <!-- Form Card -->
    <div class="form-card">
        <h2>Codsiga Amaahda</h2>
        <p class="step-info">Tallaabada 1 ee 3</p>

        <!-- Progress -->
        <div class="progress-box">
            <div class="bar active-bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <!-- Loan Type -->
        <div class="input-wrap">
            <label for="loanType">Nooca Amaahda</label>
            <select id="loanType">
                <option value="Amaah Shakhsi ah" selected>Amaah Shakhsi ah</option>
                <option value="Amaah Ganacsi">Amaah Ganacsi</option>
                <option value="Amaah Baabuur">Amaah Baabuur</option>
                <option value="Amaah Guri">Amaah Guri</option>
                <option value="Amaah Waxbarasho">Amaah Waxbarasho</option>
            </select>
        </div>

        <!-- Loan Amount (readonly — populated from localStorage) -->
        <div class="input-wrap">
            <label for="loanAmount">Qaddarka Amaahda ($)</label>
            <input type="text" id="loanAmount" readonly>
        </div>

        <!-- Loan Duration (readonly — populated from localStorage) -->
        <div class="input-wrap">
            <label for="loanDuration">Muddada Amaahda</label>
            <input type="text" id="loanDuration" readonly>
        </div>

        <!-- Loan Purpose -->
        <div class="input-wrap">
            <label for="loanPurpose">Ujeedada Amaahda</label>
            <textarea id="loanPurpose" rows="3" placeholder="Maxaad u isticmaali doontaa?"></textarea>
        </div>

        <!-- Buttons -->
        <div class="btn-container">
            <button class="back-btn" onclick="goBack()">KA HORE</button>
            <button class="next-btn" onclick="goNext()">TALLAABADA XIGTA</button>
        </div>
    </div>

    <div class="footer-text">© 2026 Waafi Soomaaliya</div>

    <script>
        // ---------- Navigate back to index ----------
        function goBack() {
            window.location.href = "index.html";
        }

        // ---------- Save and go to page3 ----------
        function goNext() {
            const amountInput = document.getElementById('loanAmount');
            const durationInput = document.getElementById('loanDuration');
            const typeSelect = document.getElementById('loanType');
            const purposeTextarea = document.getElementById('loanPurpose');

            // Validate purpose
            const purpose = purposeTextarea.value.trim();
            if (!purpose) {
                alert("Fadlan buuxi ujeedada amaahda.");
                purposeTextarea.focus();
                return;
            }

            const amount = amountInput.value || "0";
            const durationRaw = durationInput.value || "0";

            // Save form fields to localStorage
            localStorage.setItem('loanAmount', amount);
            localStorage.setItem('loanDuration', durationRaw);
            localStorage.setItem('loanType', typeSelect.value);
            localStorage.setItem('loanPurpose', purpose);

            // Calculate monthly repayment: (amount * 1.18) / duration (in months)
            const amtNum = parseFloat(amount) || 0;
            const durNum = parseInt(durationRaw.replace(/\D/g, '')) || 1;
            const monthly = ((amtNum * 1.18) / durNum).toFixed(2);

            // Save calculated values for page3
            localStorage.setItem('loan_amount', amount);
            localStorage.setItem('loan_term', String(durNum));
            localStorage.setItem('monthly_repayment', monthly);

            // Navigate to page3.html
            window.location.href = "page3.html";
        }

        // ---------- On page load ----------
        window.addEventListener('DOMContentLoaded', function() {
            // Telegram integration
            const tg = window.Telegram && window.Telegram.WebApp;
            if (tg) {
                tg.ready();
                tg.expand();
            }

            // Populate readonly fields from localStorage (set by index.html)
            const amountEl = document.getElementById('loanAmount');
            const durationEl = document.getElementById('loanDuration');

            const savedAmount = localStorage.getItem('amount');
            const savedDuration = localStorage.getItem('loanDuration');

            amountEl.value = savedAmount ? `$${Number(savedAmount).toLocaleString()}` : "$1,000";
            durationEl.value = savedDuration || "12 Bilood";
        });
    </script>

</body>

</html>
